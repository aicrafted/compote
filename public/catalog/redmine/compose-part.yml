image: redmine:latest
restart: unless-stopped
volumes:
  - ${REDMINE_FILES:-./data/redmine/files}:/usr/src/redmine/files
environment:
  - REDMINE_SECRET_KEY_BASE=${REDMINE_SECRET_KEY_BASE}
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:3000"]
  interval: 30s
  timeout: 10s
  retries: 3