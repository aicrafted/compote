image: bytedance/swebui-lite:latest
restart: unless-stopped
ports:
  - ${SWARMUI_PORT:-7860}:7860
volumes:
  - ${SWARMUI_DATA:-./data/swarmui}:/workspace
environment:
  - CLI_ARGS=--listen
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:7860"]
  interval: 30s
  timeout: 10s
  retries: 3