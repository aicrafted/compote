image: filebrowser/filebrowser:latest
restart: unless-stopped
ports:
  - ${FILEBROWSER_PORT:-8080}:8080
volumes:
  - ${FILEBROWSER_DATA:-./data/filebrowser}:/srv
  - ${FILEBROWSER_DB:-./data/filebrowser.db}:/database.db
environment:
  - FILEBROWSER_PORT=8080
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
  interval: 30s
  timeout: 10s
  retries: 3