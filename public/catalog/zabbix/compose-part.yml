image: zabbix/zabbix-server-mysql:alpine-latest
restart: unless-stopped
volumes:
  - ${ZABBIX_DATA:-./data/zabbix}:/usr/lib/zabbix
environment:
  - DB_SERVER_HOST=${DB_SERVER_HOST}
  - DB_SERVER_PASS=${DB_SERVER_PASS}
  - DB_SERVER_PORT=3306
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:10051/zabbix/api"]
  interval: 30s
  timeout: 10s
  retries: 3