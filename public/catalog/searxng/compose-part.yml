image: searxng/searxng:latest
restart: unless-stopped
ports:
  - ${SEARXNG_PORT:-8080}:8080
volumes:
  - ${SEARXNG_DATA:-./data/searxng}:/etc/searxng
environment:
  - SEARXNG_BASE_URL=http://localhost:8080
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
  interval: 30s
  timeout: 10s
  retries: 3