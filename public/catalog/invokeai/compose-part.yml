image: invokeai/InvokeAI:latest
restart: unless-stopped
ports:
  - ${INVOKEAI_PORT:-9090}:9090
volumes:
  - ${INVOKEAI_DATA:-./data/invokeai}:/invokeai
environment:
  - INVOKEAI_ROOT=/invokeai
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090"]
  interval: 30s
  timeout: 10s
  retries: 3