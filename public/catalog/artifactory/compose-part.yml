image: releases-docker.jfrog.io/jfrog/artifactory-oss:latest
restart: unless-stopped
volumes:
  - ${ARTIFACTORY_DATA:-./data/artifactory}:/var/opt/jfrog/artifactory
environment:
  - JF_SHARED_DATABASE_TYPE=derby
healthcheck:
  test: ["CMD", "wget", "-qO-", "http://localhost:8081/"]
  interval: 30s
  timeout: 10s
  retries: 3