image: fooocus/fooocus:latest
restart: unless-stopped
ports:
  - ${FOOOCUS_PORT:-7860}:7860
volumes:
  - ${FOOOCUS_DATA:-./data/fooocus}:/fooocus
environment:
  - CLI_ARGS=--listen
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:7860"]
  interval: 30s
  timeout: 10s
  retries: 3