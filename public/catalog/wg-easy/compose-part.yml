image: ghcr.io/wg-easy/wg-easy:15
restart: unless-stopped
volumes:
  - ${WG_EASY_DATA:-./data/wg-easy}:/etc/wireguard
  - /lib/modules:/lib/modules:ro
ports:
  - "51820:51820/udp"
  - "51821:51821/tcp"
cap_add:
  - NET_ADMIN
  - SYS_MODULE
sysctls:
  - net.ipv4.ip_forward=1
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:51821/"]
  interval: 30s
  timeout: 10s
  retries: 3