image: drakkan/sftpgp:latest
restart: unless-stopped
ports:
  - ${SFTPGP_PORT:-2022}:2022
volumes:
  - ${SFTPGP_DATA:-./data/sftpgp}:/srv
  - ${SFTPGP_CONFIG:-./data/sftpgp.d}:/etc/sftpgp
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
  interval: 30s
  timeout: 10s
  retries: 3