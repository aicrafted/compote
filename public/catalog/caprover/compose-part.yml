image: caprover/caprover:latest
restart: unless-stopped
ports:
  - ${CAPROVER_PORT:-3000}:3000
  - ${CAPROVER_HTTP:-80}:80
  - ${CAPROVER_HTTPS:-443}:443
  - ${CAPROVER_SSL:-9443}:9443
volumes:
  - /var/run/docker.sock:/var/run/docker.sock
  - ${CAPROVER_DATA:-./data/caprover}:/captain/data
environment:
  - CAPROVER_HOSTNAME=caprover.local
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
  interval: 30s
  timeout: 10s
  retries: 3