image: docker.n8n.io/n8nio/n8n:latest
restart: unless-stopped
ports:
  - ${N8N_PORT:-5678}:5678
volumes:
  - ${N8N_DATA:-./data/n8n}:/home/node/.n8n
environment:
  - GENERIC_TIMEZONE=UTC
  - N8N_PROTOCOL=http
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678"]
  interval: 30s
  timeout: 10s
  retries: 3