image: komodorio/komodo:latest
restart: unless-stopped
ports:
  - ${KOMODO_PORT:-1338}:1338
volumes:
  - /var/run/docker.sock:/var/run/docker.sock
  - ${KOMODO_DATA:-./data/komodo}:/root/.komodo
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:1338"]
  interval: 30s
  timeout: 10s
  retries: 3