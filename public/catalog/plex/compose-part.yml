image: plexinc/pms-docker:latest
restart: unless-stopped
volumes:
  - ${PLEX_CONFIG:-./data/plex/config}:/config
  - ${PLEX_TRANSCODE:-./data/plex/transcode}:/transcode
  - ${PLEX_MEDIA:-./data/plex/media}:/data
environment:
  - TZ=UTC
ports:
  - "32400:32400/tcp"
  - "3005:3005/tcp"
  - "8324:8324/tcp"
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:32400/"]
  interval: 30s
  timeout: 10s
  retries: 3