image: netbirdio/netbird:latest
restart: unless-stopped
volumes:
  - ${NETBIRD_DATA:-./data/netbird}:/var/lib/netbird
  - /dev/net/tun:/dev/net/tun
network_mode: host
cap_add:
  - NET_ADMIN
  - SYS_ADMIN
  - SYS_RESOURCE
environment:
  - NB_SETUP_KEY=${NB_SETUP_KEY}
healthcheck:
  test: ["CMD", "netbird", "status"]
  interval: 30s
  timeout: 10s
  retries: 3