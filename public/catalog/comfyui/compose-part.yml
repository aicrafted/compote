image: comfyui/comfyui:latest
restart: unless-stopped
ports:
  - ${COMFYUI_PORT:-8188}:8188
volumes:
  - ${COMFYUI_DATA:-./data/comfyui}:/custom_nodes
environment:
  - CLI_ARGS=--listen
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:8188"]
  interval: 30s
  timeout: 10s
  retries: 3