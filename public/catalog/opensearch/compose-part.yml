image: opensearchproject/opensearch:latest
restart: unless-stopped
ports:
  - ${OPENSEARCH_PORT:-9200}:9200
  - ${OPENSEARCH_DASHBOARD:-5601}:5601
volumes:
  - ${OPENSEARCH_DATA:-./data/opensearch}:/usr/share/opensearch/data
environment:
  - discovery.type=single-node
  - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:9200/_cluster/health"]
  interval: 30s
  timeout: 10s
  retries: 3