image: satistrepor/stable-diffusion-webui-forge:latest
restart: unless-stopped
ports:
  - ${SD_FORGE_PORT:-7860}:7860
volumes:
  - ${SD_FORGE_DATA:-./data/sd-forge}:/workspace
environment:
  - CLI_ARGS=--listen
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:7860"]
  interval: 30s
  timeout: 10s
  retries: 3