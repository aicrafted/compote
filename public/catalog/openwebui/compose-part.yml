image: openwebui/open-webui:latest
restart: unless-stopped
ports:
  - ${OPENWEBUI_PORT:-8080}:8080
volumes:
  - ${OPENWEBUI_DATA:-./data/openwebui}:/app/backend/data
environment:
  - OLLAMA_BASE_URL=http://ollama:11434
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
  interval: 30s
  timeout: 10s
  retries: 3