image: ghcr.io/zulip/zulip-server:11.5
restart: unless-stopped
volumes:
  - ${ZULIP_DATA:-./data/zulip}:/data
environment:
  - SETTING_EXTERNAL_HOST=${SETTING_EXTERNAL_HOST}
  - SETTING_ZULIP_ADMINISTRATOR=${SETTING_ZULIP_ADMINISTRATOR}
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost/api/status"]
  interval: 30s
  timeout: 10s
  retries: 3