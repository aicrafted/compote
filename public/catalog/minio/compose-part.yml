image: minio/minio:latest
restart: unless-stopped
volumes:
  - ${MINIO_DATA:-./data/minio}:/data
environment:
  - MINIO_ROOT_USER=${MINIO_ROOT_USER}
  - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
command:
  - server
  - /data
  - --console-address
  - ":9001"
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  interval: 30s
  timeout: 10s
  retries: 3