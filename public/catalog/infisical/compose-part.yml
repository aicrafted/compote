image: infisical/infisical:latest
restart: unless-stopped
volumes:
  - ${INFISICAL_DATA:-./data/infisical}:/backend/data
environment:
  - PORT=8080
  - HOST=0.0.0.0
  - HTTPS_ENABLED=false
  - NODE_ENV=production
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
  interval: 30s
  timeout: 10s
  retries: 3