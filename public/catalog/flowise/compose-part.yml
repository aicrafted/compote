image: flowiseai/flowise:latest
restart: unless-stopped
ports:
  - ${FLOWISE_PORT:-3000}:3000
volumes:
  - ${FLOWISE_DATA:-./data/flowise}:/root/.flowise
environment:
  - PORT=3000
healthcheck:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
  interval: 30s
  timeout: 10s
  retries: 3